# FedShield Test Docker Compose (PRD §15.1)
# Used by CI pipeline for integration testing.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   npm test && pytest
#   docker compose -f docker-compose.test.yml down

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fedshield_test
      POSTGRES_USER: fedshield
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedshield"]
      interval: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5
