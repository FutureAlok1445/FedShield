name: Deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API Gateway
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fedshield-api-gateway:${{ github.sha }} apps/api-gateway/
          docker push ${{ steps.ecr.outputs.registry }}/fedshield-api-gateway:${{ github.sha }}

      - name: Build & push Federation Server
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/fedshield-federation:${{ github.sha }} apps/federation-server/
          docker push ${{ steps.ecr.outputs.registry }}/fedshield-federation:${{ github.sha }}

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update ArgoCD application
        run: |
          echo "ArgoCD sync would happen here"
          echo "Image tag: ${{ github.sha }}"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
